name: screenfix_ai
description: AI assistant that analyzes any Android screen and provides actionable recommendations.
publish_to: 'none'
version: 0.1.0-alpha

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  get_it: ^8.0.2
  go_router: ^14.8.1
  dio: ^5.7.0
  shared_preferences: ^2.3.4
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  uuid: ^4.5.1
  equatable: ^2.0.7
  image: ^4.5.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
